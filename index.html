<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PetStore - Best Pet Products</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
    }

    header {
      background: #ff914d;
      padding: 15px;
      color: white;
      text-align: center;
    }

    nav {
      background: #333;
      padding: 10px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 10px;
      text-decoration: none;
    }

    .hero {
      padding: 50px;
      text-align: center;
      background: #f4f4f4;
    }

    .products {
      display: flex;
      justify-content: space-around;
      padding: 20px;
      flex-wrap: wrap;
    }

    .card {
      border: 1px solid #ccc;
      padding: 15px;
      width: 30%;
      text-align: center;
      margin: 10px;
    }

    footer {
      background: #222;
      color: white;
      text-align: center;
      padding: 15px;
    }

    button {
      background: #ff914d;
      color: white;
      border: none;
      padding: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>
  <h1>🐾 PetStore</h1>
  <p>Your One-Stop Shop for Pet Needs</p>
</header>

<nav>
  <a href="#">Home</a>
  <a href="#">Shop</a>
  <a href="#">About</a>
  <a href="#">Contact</a>
</nav>

<section class="hero">
  <h2>Best Products for Your Pets</h2>
  <p>Food, Toys, Accessories & More</p>
  <button>Shop Now</button>
</section>

<section class="products">
  <div class="card">
    <h3>Dog Food</h3>
    <p>High quality nutrition for dogs</p>
    <button>Buy Now</button>
  </div>

  <div class="card">
    <h3>Cat Toys</h3>
    <p>Fun toys for your cats</p>
    <button>Buy Now</button>
  </div>

  <div class="card">
    <h3>Pet Accessories</h3>
    <p>Everything your pet needs</p>
    <button>Buy Now</button>
  </div>
</section>

<footer>
  <p>© 2026 PetStore | All Rights Reserved</p>
</footer>

</body>
</html>
